version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_HOST=qdrant
      - ELASTICSEARCH_HOST=elasticsearch
      - NEO4J_URI=bolt://neo4j:7687
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - qdrant
      - elasticsearch
      - neo4j
      - redis
    networks:
      - rag-net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - rag-net

  neo4j:
    image: neo4j:5-enterprise
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/data
    networks:
      - rag-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - rag-net

volumes:
  qdrant_storage:
  es_data:
  neo4j_data:

networks:
  rag-net:
